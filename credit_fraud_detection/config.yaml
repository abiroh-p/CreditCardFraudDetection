# ── Data ──────────────────────────────────────────
data:
  raw_path: data/raw/creditcard.csv
  processed_dir: data/processed
  test_size: 0.2
  random_seed: 42

# ── Feature Engineering ───────────────────────────
features:
  amount_log: true
  time_delta: true  # seconds: 1min, 1hr, 24hr

# ── Autoencoder ───────────────────────────────────
autoencoder:
  hidden_dims: [128, 64, 32]
  dropout: 0.1
  learning_rate: 0.0005
  batch_size: 512
  epochs: 150
  early_stopping_patience: 15

# ── Isolation Forest ──────────────────────────────
isolation_forest:
  n_estimators: 200
  contamination: 0.0017    # 492/284807 = actual fraud rate
  random_seed: 42

# ── Ensemble ──────────────────────────────────────
ensemble:
  ae_weight: 0.75
  if_weight: 0.25

evaluation:
  target_recall: 0.75
  output_dir: outputs/reports

# ── Paths ─────────────────────────────────────────
paths:
  saved_models: saved_models
  plots: outputs/plots
  reports: outputs/reports
